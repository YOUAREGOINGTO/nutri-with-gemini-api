name: Build APK

on:
  workflow_dispatch:

jobs:
  build_apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Create temporary signing key
        run: |
          keytool -genkeypair \
            -v \
            -keystore android/app/temp-release-key.jks \
            -storepass android \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -alias temp \
            -dname "CN=NutriNutri, OU=Local Build, O=NutriNutri, L=Local, S=Local, C=US"
          cat > android/key.properties <<'EOF'
          storePassword=android
          keyPassword=android
          keyAlias=temp
          storeFile=temp-release-key.jks
          EOF

      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK
        run: cp build/app/outputs/flutter-apk/app-release.apk nutrinutri-android.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nutrinutri-android-apk
          path: nutrinutri-android.apk
